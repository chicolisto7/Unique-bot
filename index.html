<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UNIQUE BOT Pair Code</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{

width:90%;
max-width:400px;
background:#1e293b;
padding:35px;
border-radius:15px;
text-align:center;
box-shadow:0 0 30px #000;

}

.title{

font-size:28px;
font-weight:bold;
background:linear-gradient(90deg,red,orange,yellow,green,cyan,blue,violet);
-webkit-background-clip:text;
color:transparent;
animation:rainbow 5s linear infinite;

}

@keyframes rainbow{
100%{filter:hue-rotate(360deg)}
}

input{

width:100%;
padding:12px;
border-radius:8px;
border:none;
margin-top:20px;
font-size:16px;

}

button{

width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background:#22c55e;
font-size:16px;
cursor:pointer;

}

.code{

margin-top:25px;
font-size:22px;
background:#000;
padding:15px;
border-radius:10px;

}

</style>

</head>

<body>

<div class="card">

<div class="title">UNIQUE BOT 𓃬</div>

<p>Generate WhatsApp Pair Code</p>

<input id="num" placeholder="255712345678">

<button onclick="pair()">Generate Code</button>

<div id="code" class="code">----</div>

</div>

<script>

async function pair(){

let number = document.getElementById("num").value

let res = await fetch("/pair",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
number:number
})
})

let data = await res.json()

if(data.status){

document.getElementById("code").innerText = data.code

}else{

alert("Error")

}

}

</script>

</body>

</html>
